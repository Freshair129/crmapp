# V SCHOOL CRM v2 — ID FORMATTING & NAMING CONVENTIONS
# Source of Truth for all identifier formats and casing rules
# Last updated: 2026-03-16 (v0.18.0)
# ─────────────────────────────────────────────────────────

id_naming_conventions:

  # ─────────────────────────────────────────────
  # DOMAIN: Customer
  # ─────────────────────────────────────────────

  - category: "Customer Identifiers"
    description: "Standardized cross-channel customer identifiers."
    formats:
      - name: "Customer ID"
        format: "TVS-CUS-[CHANNEL]-[YY]-[XXXX]"
        example: "TVS-CUS-FB-26-0001"
        description: "Permanent internal identifier. CHANNEL: FB=Facebook, LN=LINE, WB=Walk-in"
        generated_by: "customerRepo.js — auto-increment per channel per year"

      - name: "Member ID (Student ID)"
        format: "MEM-[YY][AGENT][INTENT]-[SERIAL]"
        example: "MEM-26BKKP-0001"
        description: |
          Semantic ID สำหรับนักเรียน:
          [YY] = ปีสมัคร (26 = 2026)
          [AGENT] = รหัสย่อ Agent (e.g., BKK)
          [INTENT] = P=Pro/เชฟ · B=Business · H=Hobby
          [SERIAL] = ลำดับรันนิ่ง 4 หลัก (0001-9999)

      - name: "origin_id"
        description: |
          ID ของแหล่งที่มา (Source Attribution) ที่ทำให้ลูกค้าเข้าสู่ระบบครั้งแรก
          เช่น ad_id, post_id, qr_code_id, lead_form_id
          ใช้คำนวณ ROAS รายตัวได้แม่นยำ
        stored_in: "Customer.originId (ADR-025)"

  # ─────────────────────────────────────────────
  # DOMAIN: Employee / Agent
  # ─────────────────────────────────────────────

  - category: "Employee & Agent Identifiers"
    description: "ID สำหรับพนักงานประจำและตัวแทน"
    formats:
      - name: "Employee ID"
        format: "TVS-EMP-[YYYY]-[XXXX]"
        example: "TVS-EMP-2026-0001"
        description: "รหัสพนักงานประจำ (มีสัญญาจ้าง) — auto-generated ตอน seed/create"
        note: "ไม่ใช่ TVS-MKT-001 รูปแบบเก่า — v2 ใช้ TVS-EMP เท่านั้น"

      - name: "Agent Code"
        format: "AGT-[TYPE]-[YEAR]-[SERIAL]"
        example: "AGT-H-26-003, AGT-AI-G4-001"
        description: |
          รหัสตัวแทน:
          [TYPE]: H=Human · AI=Artificial Intelligence
          [YEAR]: ปีที่ลงทะเบียน (เช่น 26) หรือรหัสรุ่น AI (G4=Gemini 4)
          [SERIAL]: 001-999

  # ─────────────────────────────────────────────
  # DOMAIN: Conversation / Messaging
  # ─────────────────────────────────────────────

  - category: "Conversational Identifiers"
    description: "ID hierarchy สำหรับแชท (Facebook + LINE)"
    formats:
      - name: "Conversation ID (FB Thread)"
        format: "t_{15_digit_uid}"
        example: "t_10163799966326505"
        description: "Raw Facebook threadID — Primary Key ในตาราง conversations"

      - name: "PSID (Page-Scoped ID)"
        format: "{16-17 digit number}"
        description: "Facebook Page-Scoped User ID — primary webhook identifier ใน Customer.facebookId"
        warning: "PSID ≠ fb_thread_id — ห้ามนำมาเทียบกันโดยตรง"

      - name: "Message ID"
        format: "mid.$c... หรือ m_..."
        description: "Facebook Message ID — ใช้ deduplication (idempotency key)"

      - name: "Session ID (AI Context)"
        format: "session_{YYYYMMDD}_{HHMMSS}_{ExtID}"
        description: "AI context session boundary — สร้างเมื่อ 30 นาที timeout หรือ intent เปลี่ยน"

  # ─────────────────────────────────────────────
  # DOMAIN: Product / Course / Package
  # ─────────────────────────────────────────────

  - category: "Product & Course Identifiers"
    description: "รหัสคอร์สและแพ็กเกจ (ADR-037: Product model = Course Catalog)"
    formats:
      - name: "Course Product ID"
        format: "PRD-CRS-[YYYY]-[SERIAL]"
        example: "PRD-CRS-2026-001"
        description: "คอร์สเรียนเดี่ยว — กรอกใน Google Sheets แล้ว sync เข้าระบบ"

      - name: "Package Product ID"
        format: "PRD-PKG-[YYYY]-[SERIAL]"
        example: "PRD-PKG-2026-001"
        description: "คอร์สประเภทแพ็กเกจ (category=package)"

      - name: "Standard Course Code (Legacy)"
        format: "TVS-[CAT]-[PACK]-[SUBCAT]-[SERIAL]"
        example: "TVS-JP-1FC-HC-20"
        description: |
          รหัสคอร์สรูปแบบเก่า (reference เท่านั้น):
          CAT: JP=ญี่ปุ่น · TH=ไทย
          PACK: 1FC=Full Course Pack 1 · SP=Special · MA=Management
          SUBCAT: H=Hot Kitchen · C=Cold Kitchen

  - category: "Package Bundle Identifiers"
    formats:
      - name: "Package ID"
        format: "PKG-[YYYY]-[SERIAL]"
        example: "PKG-2026-001"
        description: "แพ็กเกจรวมคอร์ส — auto-generated ใน packageRepo.js"
        generated_by: "packageRepo.js → generatePackageId()"

      - name: "Package Enrollment ID"
        format: "PENR-[YYYY]-[SERIAL]"
        example: "PENR-2026-001"
        description: "การลงทะเบียนแพ็กเกจของลูกค้า (ไม่ใช่ ENR)"
        generated_by: "packageRepo.js → generatePackageEnrollmentId()"
        warning: "ต้องเป็น PENR ไม่ใช่ ENR — path แยกกันชัดเจน"

  # ─────────────────────────────────────────────
  # DOMAIN: Enrollment / Schedule
  # ─────────────────────────────────────────────

  - category: "Enrollment & Schedule Identifiers"
    formats:
      - name: "Enrollment ID"
        format: "ENR-[YYYYMMDD]-[SERIAL]"
        example: "ENR-20260316-001"
        description: "การลงทะเบียนคอร์สเดี่ยว (ไม่ใช่แพ็กเกจ)"
        generated_by: "enrollmentRepo.js → generateEnrollmentId()"

      - name: "Course Schedule ID"
        format: "SCH-[YYYYMMDD]-[SERIAL]"
        example: "SCH-20260316-001"
        description: "ตารางคลาส 1 session"
        generated_by: "scheduleRepo.js → generateScheduleId()"

      - name: "Class ID"
        model: "CourseSchedule"
        format: "CLS-[YYYYMM]-[SERIAL]"
        example: "CLS-202603-001"
        serial_padding: 3
        scope: "monthly (resets per month)"
        generation: "scheduleRepo.generateClassId()"
        description: "Class cohort ID — groups multiple schedule days (multi-day course) into one class run"

      - name: "Attendance ID"
        format: "ATT-[YYYYMMDD]-[SERIAL]"
        example: "ATT-20260316-001"
        description: "บันทึกการเข้าเรียน 1 ครั้ง — เชื่อม EnrollmentItem กับ CourseSchedule"

  # ─────────────────────────────────────────────
  # DOMAIN: Kitchen / Ingredient / Recipe
  # ─────────────────────────────────────────────

  - category: "Kitchen & Recipe Identifiers"
    formats:
      - name: "Ingredient ID"
        format: "ING-[YYYY]-[SERIAL]"
        example: "ING-2026-001"
        description: "วัตถุดิบในครัว — กรอกใน Google Sheets แล้ว sync"

      - name: "Recipe ID"
        format: "RCP-[YYYY]-[SERIAL]"
        example: "RCP-2026-001"
        description: "สูตรอาหาร — auto-generated ใน recipeRepo.js"
        generated_by: "recipeRepo.js → generateRecipeId()"
        note: "field chef และ category เก็บแยกใน Recipe model ไม่ embed ใน ID"

      - name: "Menu ID (Legacy Reference)"
        format: "[Cuisine][Cat][Kitchen]-[Type][SERIAL]"
        example: "THMDH-N001"
        description: |
          รหัสเมนูอาหารรูปแบบเดิม (ใช้ใน Product.linkedMenuIds[] เป็น reference):
          Cuisine: JP, TH · Category: AP=Appetizer, MD=Main, DE=Dessert
          Kitchen: H=Hot, C=Cold · Type: N=Normal, S=Special

      - name: "Purchase Request ID"
        format: "PR-[YYYYMMDD]-[SERIAL]"
        example: "PR-20260316-001"
        description: "ใบขอซื้อวัตถุดิบ — auto-generated เมื่อ complete session"
        generated_by: "kitchenRepo.js → generatePurchaseRequestId()"

      - name: "Lot ID"
        model: "IngredientLot"
        format: "LOT-[YYYYMMDD]-[SERIAL]"
        example: "LOT-20260316-001"
        serial_padding: 3
        scope: "daily (resets per day)"
        generation: "kitchenRepo.generateLotId()"
        description: "Stock lot/batch ID — tracks individual received shipments for FEFO/FIFO inventory"

  # ─────────────────────────────────────────────
  # DOMAIN: Asset
  # ─────────────────────────────────────────────

  - category: "Asset Identifiers"
    formats:
      - name: "Asset ID (Equipment)"
        format: "AST-[CAT3]-[YYYY]-[SERIAL]"
        example: "AST-KIT-2026-001, AST-EQP-2026-001"
        description: |
          อุปกรณ์และทรัพย์สิน:
          CAT3: KIT=Kitchen · EQP=Equipment · VEH=Vehicle · BLD=Building · ITO=IT · GEN=General
        generated_by: "assetRepo.js → generateAssetId(category, year)"

      - name: "Asset ID (Media — Legacy)"
        format: "AST-IMG-[SERIAL]"
        example: "AST-IMG-001"
        description: "รหัสไฟล์มัลติมีเดีย (รูปสลิป, หน้าจอลูกค้า) — ใช้ใน Asset.photos[]"

  # ─────────────────────────────────────────────
  # DOMAIN: Orders / Payment
  # ─────────────────────────────────────────────

  - category: "Order & Payment Identifiers"
    formats:
      - name: "Order ID"
        format: "UUID (auto)"
        description: "รหัสคำสั่งซื้อ — Prisma UUID"

      - name: "Payment / Transaction ID"
        format: "PAY-[YYYYMMDD]-[SERIAL]"
        example: "PAY-20260316-001"
        description: "รหัสการชำระเงิน — ผูก Order กับ Transaction หลายรายการ"

  # ─────────────────────────────────────────────
  # DOMAIN: Tasks / Cases / Support
  # ─────────────────────────────────────────────

  - category: "Task & Support Identifiers"
    formats:
      - name: "Task ID"
        format: "TSK-[YYYYMMDD]-[SERIAL]"
        example: "TSK-20260316-001"
        description: "งานที่ต้องดำเนินการ (Follow-up, Call, Email) — Actionable"

      - name: "Note ID"
        format: "NOTE-[YYYYMMDD]-[RANDOM]"
        example: "NOTE-20260307-X12"
        description: "บันทึกภายใน (คอมเม้นต์ผู้จัดการ, Audit Trail) — ไม่ใช่ Task"

      - name: "Ticket ID"
        format: "TKT-[CHANNEL]-[YEAR]-[SERIAL]"
        example: "TKT-FB-26-005"
        description: "Support Ticket — ติดตามปัญหาหรือคำขอพิเศษ"

      - name: "Case ID"
        format: "CASE-[YYYYMMDD]-[SERIAL]"
        example: "CASE-20260307-001"
        description: "Container รวม Ticket + Task + Conversation ที่เกี่ยวกัน (เช่น เคสขอเงินคืน)"

  # ─────────────────────────────────────────────
  # DOMAIN: Notifications
  # ─────────────────────────────────────────────

  - category: "Notification Identifiers"
    formats:
      - name: "Notification Rule ID"
        format: "NOT-[YYYYMMDD]-[SERIAL]"
        example: "NOT-20260316-001"
        description: "กฎการแจ้งเตือน — auto-generated ใน /api/notifications/rules"
        generated_by: "notifications/rules/route.js"

  # ─────────────────────────────────────────────
  # DOMAIN: Marketing / Ads
  # ─────────────────────────────────────────────

  - category: "Marketing & Audit Identifiers"
    formats:
      - name: "Sync / Trace ID"
        format: "SYNC-[TYPE]-[YYYYMMDD]-[RANDOM4]"
        example: "SYNC-ADS-20260316-A92B"
        description: "รหัสอ้างอิง batch sync — ใช้ trace เมื่อ sync ล้มเหลว"
        types: "ADS=Ad sync · MSG=Message sync · CSV=Sheet sync"

      - name: "Meta Native IDs"
        description: |
          ID จาก Facebook/Meta (String เสมอ):
          fb_campaign_id, fb_adset_id, fb_ad_id — จาก Meta Graph API
          lead_id — จาก Facebook Lead Form

  # ─────────────────────────────────────────────
  # DOMAIN: Inventory / Learning Quota
  # ─────────────────────────────────────────────

  - category: "Inventory & Learning Quota"
    formats:
      - name: "Inventory Item (Credit Slot)"
        format: "INV-[CUS_ID]-[ITEM_ID]-[SEQ]"
        example: "INV-CUS-FB26-001-JP2FC01-01"
        description: "สิทธิ์การเรียนที่ลูกค้าครอบครอง เก็บโควต้าชั่วโมงและเมนูที่เหลือ"

# ─────────────────────────────────────────────────────────
# CASING CONVENTIONS
# ─────────────────────────────────────────────────────────

casing_conventions:

  - category: "Casing Standards (บังคับใช้ทุก layer)"
    rules:
      - name: "Database Columns / Prisma @map"
        case: "snake_case"
        example: "customer_id, fb_thread_id, enrollment_id"
        description: "ใช้สำหรับ PostgreSQL column names และ @map() ใน Prisma schema"

      - name: "Application Code (JavaScript / TypeScript)"
        case: "camelCase"
        example: "customerId, fbThreadId, enrollmentId"
        description: "ใช้ทุกที่ใน JS/TS — ห้ามใช้ snake_case เด็ดขาด"

      - name: "React Components"
        case: "PascalCase"
        example: "CustomerList, ScheduleCalendar, PackagePage"

      - name: "Environment Variables"
        case: "SCREAMING_SNAKE_CASE"
        example: "FB_PAGE_ID, SHEET_COURSES_URL, NEXT_PUBLIC_FB_PAGE_ID"

      - name: "CSS"
        case: "Tailwind utility classes"
        example: "text-sm, font-bold, bg-white/10"

# ─────────────────────────────────────────────────────────
# CROSS-LINK LOGIC (Product → Menu → Recipe → Ingredient)
# ─────────────────────────────────────────────────────────

cross_link_logic:

  - name: "COURSE → MENU Link"
    description: |
      Product.linkedMenuIds[] เชื่อม Course กับ Recipe IDs
      ใช้ดึงวัตถุดิบและสูตรอาหารมาแสดงผล
    schema_field: "Product.linkedMenuIds: String[] @default([])"

  - name: "PKG → COURSE Link"
    description: "Package มี PackageCourse[] (N:N) เก็บ productId ของแต่ละคอร์ส"
    schema_model: "PackageCourse"

  - name: "RECIPE → INGREDIENT Link"
    description: "Recipe มี RecipeIngredient[] — ตัดสต็อกเมื่อ complete session"
    stock_deduction: "qtyPerPerson × confirmedStudents (Ingredient) · qtyRequired per session (RecipeEquipment)"

  - name: "Dependency Fallback Strategy"
    description: |
      ถ้าไม่สามารถระบุ Menu ID ได้:
      1. Fallback → Product.fallbackSubCategory (H, C)
      2. Fallback → Product.fallbackCategory (JP, TH)
      3. Fallback → UNKNOWN (แจ้ง Admin ทำ mapping)

# ─────────────────────────────────────────────────────────
# ID ORIGIN TABLE (ที่มาของ ID แต่ละตัว)
# ─────────────────────────────────────────────────────────

id_origins:

  - id: "customerId"
    origin: "Internal"
    generated_by: "customerRepo.js"
    primary_key: false
    note: "UUID เป็น PK หลัก — customerId เป็น business key"

  - id: "facebookId (PSID)"
    origin: "External (Meta Webhook)"
    generated_by: "Facebook"
    stored_in: "Customer.facebookId"
    warning: "PSID ≠ fb_thread_id"

  - id: "conversationId (fb_thread_id)"
    origin: "External (Meta)"
    format: "t_{15_digit_uid}"
    stored_in: "Conversation.conversationId"

  - id: "messageId"
    origin: "External (Meta)"
    format: "mid.$c... หรือ m_..."
    stored_in: "Message.messageId"
    purpose: "Idempotency / deduplication"

  - id: "transactionId"
    origin: "Internal / External (SlipOK)"
    stored_in: "Transaction.transactionId"

  - id: "attachment_id"
    origin: "External (Meta Graph API)"
    description: "ได้จาก Webhook เมื่อลูกค้าส่งรูป/ไฟล์"

  - id: "responderId"
    origin: "Internal"
    format: "UUID (matches Employee.id)"
    stored_in: "Message.responderId"
    purpose: "KPI Attribution — ระบุว่าใครตอบข้อความนั้น"
