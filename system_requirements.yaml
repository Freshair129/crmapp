# V SCHOOL CRM v2 — SYSTEM REQUIREMENTS
# โรงเรียนสอนทำอาหารญี่ปุ่น, กรุงเทพฯ
# Last updated: 2026-03-19 (v0.27.0)
# ─────────────────────────────────────────────────────────

system_name: "The V School CRM v2"
version: "0.27.0"
description: |
  Greenfield CRM สำหรับ The V School — เขียนใหม่ทั้งหมด (ไม่ใช่ refactor)
  รวม Meta Ads sync, Messenger/LINE inbox, AI (Gemini), Kitchen Ops,
  Course Enrollment, Asset Management, Recipe & Package management

tech_stack:
  framework: "Next.js 14 App Router"
  database: "PostgreSQL (Supabase) via Prisma ORM"
  queue: "Upstash QStash (HTTP) — แทน BullMQ local worker (ADR-040)"
  cache: "Upstash Redis REST — แทน ioredis local docker (ADR-040)"
  ai: "Google Gemini"
  styling: "TailwindCSS"
  marketing_api: "Meta Graph API v19.0"
  auth: "NextAuth.js (CredentialsOnly — ADR-035)"

# ─────────────────────────────────────────────────────────
# FUNCTIONAL REQUIREMENTS
# ─────────────────────────────────────────────────────────

functional_requirements:

  # ── MODULE 1: AUTH & RBAC ──────────────────────────────

  - module: "Authentication & RBAC"
    ui_tab: "LoginPage"
    status: "✅ Working"
    adr: "ADR-026, ADR-035"
    description: "Email+Password login, 6-tier RBAC, server-side guard"
    features:
      - name: "FR1.1: Email & Password Login"
        status: "✅ Working"
        description: "NextAuth CredentialsProvider — bcrypt hash verify"
        note: "Facebook Login ถูกลบออกแล้ว (ADR-035) เพราะ Facebook ซ่อน Admin PSID"

      - name: "FR1.2: Employee-to-Identity Mapping"
        status: "✅ Working"
        description: |
          Employee.identities JSONB เก็บ { facebook: { psid, name }, line: { id } }
          ใช้ระบุว่าพนักงานคนไหนตอบข้อความนั้น (responder attribution)

      - name: "FR1.3: Role-Based Access Control (RBAC)"
        status: "✅ Working"
        description: |
          6-tier role hierarchy (server-side guard via middleware.js):
          Developer > Manager > Supervisor > Admin > Agent > Guest
          Granular overrides ใน Employee.permissions JSONB

  # ── MODULE 2: MESSAGING & WEBHOOK ─────────────────────

  - module: "Messaging & Webhook"
    ui_tab: ["UnifiedInbox"]
    status: "✅ Working"
    adr: "ADR-028, ADR-033"
    dependencies: ["Meta Graph API v19.0", "LINE Messaging API", "Redis", "BullMQ"]
    features:
      - name: "FR2.1: Receive Facebook Webhooks"
        status: "✅ Working"
        description: "รับ Message/Postback/Opt-in events จาก Meta < 200ms (NFR1)"
        implementation: "src/app/api/webhooks/facebook/route.js"
        note: "P2002 race condition fixed — try-catch create + findFirst fallback"

      - name: "FR2.2: Receive LINE Webhooks"
        status: "✅ Working"
        description: "รับข้อความ LINE, verify X-Line-Signature"
        implementation: "src/app/api/webhooks/line/route.js"

      - name: "FR2.3: Idempotency (Prevent Duplicates)"
        status: "✅ Working"
        description: "ป้องกันข้อความซ้ำด้วย Message.messageId (fb_mid) unique constraint"

      - name: "FR2.4: Referral & Ad Attribution"
        status: "✅ Working"
        description: "บันทึก ad_id จาก Webhook referral → Customer.originId"

      - name: "FR2.5: Unified Inbox (FB + LINE)"
        status: "✅ Working"
        description: "หน้า inbox รวม FB + LINE พร้อม pagination, reply, customer card"
        implementation: "src/components/UnifiedInbox.js"

      - name: "FR2.6: Notification Engine"
        status: "✅ Working"
        description: |
          evaluateRules() ตรวจ keyword/tier/VIP conditions
          → Upstash QStash publishJSON → /api/workers/notification (Vercel serverless)
          → verify QStash signature → LINE push via pushMessage()
        implementation: "src/lib/notificationEngine.js, src/app/api/workers/notification/route.js"
        note: "v0.27.0 (ADR-040): notificationWorker.mjs + queue.js ถูกลบแล้ว — แทนด้วย QStash"

  # ── MODULE 3: IDENTITY RESOLUTION ─────────────────────

  - module: "Identity Resolution"
    ui_tab: ["customers"]
    status: "✅ Partially Working"
    adr: "ADR-025"
    features:
      - name: "FR3.1: Phone Number Normalization (E.164)"
        status: "✅ Working"
        description: "normalizePhone() แปลงเบอร์ → E.164 ก่อน upsert"

      - name: "FR3.2: Cross-platform Identity Merge"
        status: "✅ Working"
        description: "merge FB + LINE ผ่าน phone match → single global_user_id (UUID)"
        implementation: "src/lib/identityService.js"

      - name: "FR3.3: Scraper Agent Attribution (Heuristic)"
        status: "✅ Working"
        description: |
          แปลง 'Sent by [Name]' prefix → responder_id
          ใช้ ADR-022: message text search fallback (min 15 chars)

      - name: "FR3.4: Admin PSID Permanent Mapping"
        status: "✅ Working"
        description: "บันทึก PSID ใน Employee.identities.facebook.psid อัตโนมัติ"

  # ── MODULE 4: MARKETING & ADS ─────────────────────────

  - module: "Marketing & Ads"
    ui_tab: ["facebook-ads", "ExecutiveAnalytics"]
    status: "✅ Working"
    adr: "ADR-024, ADR-030"
    dependencies: ["Meta Graph API v19.0", "Redis"]
    features:
      - name: "FR4.1: Hourly Ad Sync"
        status: "✅ Working"
        description: |
          Sync Ad metrics จาก Meta Graph API ทุกชั่วโมง
          Exponential backoff retry (429) · Batch-of-5 concurrency
          ACCESS_TOKEN_EXPIRED sentinel → 401 response
        implementation: "src/app/api/marketing/sync-hourly/route.js"

      - name: "FR4.2: Bottom-Up Aggregation"
        status: "✅ Working"
        description: |
          Campaign metrics คำนวณ Bottom-Up จาก Ad level เสมอ (ADR-024 D2)
          Campaign ไม่เก็บ aggregate — คำนวณใน app layer

      - name: "FR4.3: Revenue Channel Split"
        status: "✅ Working"
        description: "conversationId → Ads vs Store classification (ADR-030)"

      - name: "FR4.4: Hourly Ledger (Append-Only)"
        status: "✅ Working"
        description: "AdHourlyLedger — บันทึกเมื่อ delta ≠ 0 เท่านั้น"
        implementation: "model AdHourlyLedger in schema.prisma"

      - name: "FR4.5: Data Integrity Checksum"
        status: "✅ Working"
        description: "Sum(Ads.Metrics) == Campaign.Metrics — log mismatch เป็น error"

      - name: "FR4.6: Differential Sync (Rate Limit Optimization)"
        status: "✅ Working"
        description: |
          Ad-Level First fetch · updated_time filtering
          Delta = 0 → ข้ามการเขียน record รายชั่วโมง
          Full Sync ทุกต้นวัน (00:00-01:00)

      - name: "FR4.7: Executive Analytics Dashboard"
        status: "✅ Working"
        description: "Recharts charts + KPI cards + Framer Motion"
        implementation: "src/components/ExecutiveAnalytics.js"

      - name: "FR4.8: AI Intent Analysis (Gemini)"
        status: "✅ Working"
        description: "ส่ง chat history ให้ Gemini วิเคราะห์ Customer Intent → Customer.intelligence"

  # ── MODULE 5: CUSTOMER DATABASE ───────────────────────

  - module: "Customer Database"
    ui_tab: ["customers"]
    status: "✅ Working"
    features:
      - name: "Customer Index (List + Search)"
        status: "✅ Working"
        implementation: "src/components/CustomerList.js"
        description: "tier filter, search, FB/LINE deep links"

      - name: "Customer 360 Profile"
        status: "✅ Working"
        description: "Timeline, Wallet, Tags, Enrollment history, Intelligence"

      - name: "Customer Registration"
        status: "✅ Working"
        description: "inline creation จาก POS + inbox"

      - name: "Membership Tiers"
        status: "✅ Working"
        values: ["MEMBER", "SILVER", "GOLD", "PLATINUM", "VIP", "DIAMOND"]

  # ── MODULE 6: STORE & ORDER ───────────────────────────

  - module: "Store & Order Management"
    ui_tab: ["store", "orders"]
    status: "✅ Working"
    features:
      - name: "PremiumPOS (Point of Sale)"
        status: "✅ Working"
        implementation: "src/components/PremiumPOS.js"
        description: "inline customer creation + enrollment on checkout + success modal"

      - name: "Shopping Cart"
        status: "✅ Working"
        description: "CartItem model — unique per customer+product"

      - name: "Order & Transaction Tracking"
        status: "✅ Working"
        description: "Order → Transaction[] (slip + payment records)"

  # ── MODULE 7: COURSE ENROLLMENT ───────────────────────

  - module: "Course Enrollment"
    ui_tab: ["CourseEnrollmentPanel"]
    status: "✅ Working"
    adr: "ADR-037"
    features:
      - name: "FR7.1: Course Enrollment"
        status: "✅ Working"
        description: "createEnrollment + package expansion"
        implementation: "src/lib/repositories/enrollmentRepo.js"

      - name: "FR7.2: Hours Tracking & Certification"
        status: "✅ Working"
        description: |
          updateHours() + cert threshold:
          30h → Basic Cert · 111h → Professional · 201h → Master
        cert_levels: [30, 111, 201]

      - name: "FR7.3: Class Attendance"
        status: "✅ Working"
        description: "ClassAttendance model — เชื่อม EnrollmentItem กับ CourseSchedule"

      - name: "FR7.4: Package Enrollment"
        status: "✅ Working"
        description: |
          PackageEnrollment + course swap (1 ครั้ง/enrollment)
          swapUsedAt non-null = ใช้สิทธิ์ไปแล้ว → 409
        implementation: "src/lib/repositories/packageRepo.js"

  # ── MODULE 8: SCHEDULE CALENDAR ───────────────────────

  - module: "Course Schedule Calendar"
    ui_tab: ["ScheduleCalendar"]
    status: "✅ Working"
    features:
      - name: "FR8.1: Schedule CRUD"
        status: "✅ Working"
        implementation: "src/lib/repositories/scheduleRepo.js"

      - name: "FR8.2: Calendar View"
        status: "✅ Working"
        description: "List + Week + Calendar views, multi-day course spanning"
        implementation: "src/components/ScheduleCalendar.js"

      - name: "FR8.3: Complete Session + Stock Deduction"
        status: "✅ Working"
        description: |
          completeSessionWithStockDeduction() — prisma.$transaction
          ตัดสต็อก RecipeIngredient × studentCount
          ตัดสต็อก RecipeEquipment per session (ไม่คูณ)
        implementation: "src/app/api/schedules/[id]/complete/route.js"

  # ── MODULE 9: KITCHEN OPS ─────────────────────────────

  - module: "Kitchen Operations"
    ui_tab: ["KitchenStockPanel"]
    status: "✅ Working"
    features:
      - name: "FR9.1: Ingredient Stock Management"
        status: "✅ Working"
        description: "CRUD ingredients, low-stock filter, inline edit"
        implementation: "src/lib/repositories/kitchenRepo.js"

      - name: "FR9.2: Bill of Materials (BOM)"
        status: "✅ Working"
        description: "CourseBOM — qty per person per course"

      - name: "FR9.3: Purchase Request (Auto-Generate)"
        status: "✅ Working"
        description: "Auto-generate PR จาก BOM เมื่อสต็อกต่ำกว่า min"
        id_format: "PR-YYYYMMDD-SERIAL"

      - name: "FR9.4: Recipe Management"
        status: "✅ Working"
        description: "Recipe + RecipeIngredient + RecipeEquipment (stock-tracked)"
        implementation: "src/components/RecipePage.js"

  # ── MODULE 10: ASSET MANAGEMENT ───────────────────────

  - module: "Asset Management"
    ui_tab: ["AssetPanel"]
    status: "✅ Working"
    features:
      - name: "FR10.1: Asset CRUD"
        status: "✅ Working"
        description: "Asset grid, category/status filter, create+edit modal"
        implementation: "src/lib/repositories/assetRepo.js"
        categories: ["KITCHEN", "EQUIPMENT", "VEHICLE", "BUILDING", "IT", "GENERAL"]
        statuses: ["ACTIVE", "MAINTENANCE", "RETIRED"]

      - name: "FR10.2: Asset Assignment"
        status: "✅ Working"
        description: "Asset.assignedToId → Employee"

  # ── MODULE 11: PACKAGE MANAGEMENT ─────────────────────

  - module: "Package Management"
    ui_tab: ["PackagePage"]
    status: "✅ Working"
    features:
      - name: "FR11.1: Package CRUD"
        status: "✅ Working"
        description: "Package + PackageCourse (swap groups) + PackageGift"
        implementation: "src/components/PackagePage.js"

      - name: "FR11.2: Package Enrollment + Swap"
        status: "✅ Working"
        description: "createPackageEnrollment, swapCourseInEnrollment (1 ครั้ง)"
        endpoint: "POST /api/packages/[id]/swap"

  # ── MODULE 12: GOOGLE SHEETS SYNC ─────────────────────

  - module: "Google Sheets Integration"
    status: "✅ Working"
    adr: "ADR-036"
    description: "Google Sheets เป็น SSOT สำหรับ master data"
    features:
      - name: "FR12.1: Master Data Sync (CSV)"
        status: "✅ Working"
        description: "Sync courses/ingredients/BOM/assets จาก Sheets CSV URL"
        implementation: "src/app/api/sheets/sync-master-data/route.js"
        env_vars:
          - SHEET_COURSES_URL
          - SHEET_INGREDIENTS_URL
          - SHEET_BOM_URL
          - SHEET_ASSETS_URL

  # ── MODULE 13: NOTIFICATION RULES ─────────────────────

  - module: "Notification Rules"
    status: "✅ Working"
    features:
      - name: "FR13.1: Rule Management"
        status: "✅ Working"
        description: "GET/POST/DELETE notification rules"
        implementation: "src/app/api/notifications/rules/route.js"
        events: ["MESSAGE_RECEIVED", "CONVERSATION_CLOSED", "INACTIVITY"]

      - name: "FR13.2: LINE Push via QStash"
        status: "✅ Working"
        description: "QStash HTTP queue → /api/workers/notification → pushMessage() → LINE Messaging API"
        implementation: "src/app/api/workers/notification/route.js"
        note: "v0.27.0 (ADR-040): เปลี่ยนจาก BullMQ worker เป็น QStash serverless"

  # ── MODULE 14: TASK MANAGEMENT ────────────────────────


  # ── MODULE 15: PAYMENT & SLIP OCR ─────────────────────

  - module: "Payment & Slip OCR (Chat-First Revenue)"
    status: "✅ Working"
    adr: "ADR-039"
    description: "ใช้สลิปโอนเงินในแชทเป็น Source of Truth ของ Revenue — แทน Meta estimated"
    features:
      - name: "FR15.1: Slip OCR via Gemini Vision"
        status: "✅ Working"
        description: |
          parseSlip(imageUrl) → { isSlip, confidence, amount, date, refNumber, bankName }
          threshold: confidence ≥ 0.80 ถึงสร้าง Transaction อัตโนมัติ
        implementation: "src/lib/slipParser.js"

      - name: "FR15.2: Webhook Slip Detection"
        status: "✅ Working"
        description: "FB + LINE webhook detect attachmentType=image → fire-and-forget OCR (NFR1 ครบ)"
        implementation: "src/app/api/webhooks/facebook/route.js, src/app/api/webhooks/line/route.js"

      - name: "FR15.3: Payment Repository"
        status: "✅ Working"
        description: |
          createPendingFromSlip → PENDING Transaction
          verifyPayment(id, employeeId) → VERIFIED + Order CLOSED
          getMonthlyRevenue → fromAds vs organic split
        implementation: "src/lib/repositories/paymentRepo.js"

      - name: "FR15.4: Employee Verify Flow"
        status: "✅ Working"
        description: "PATCH /api/payments/verify/[id] — พนักงาน verify สลิปก่อน Revenue นับ"
        endpoint: "PATCH /api/payments/verify/[id]"

      - name: "FR15.5: REQ-07 First Touch Ad Attribution"
        status: "✅ Working"
        description: |
          Conversation.firstTouchAdId — บันทึก referral.ad_id จาก FB webhook เฉพาะตอน CREATE (immutable)
          getMonthlyRevenue ใช้ firstTouchAdId แยก Ads vs Organic ROAS
        note: "historical conversations ก่อน v0.26.0 จะมี firstTouchAdId = null (= organic)"

  # ── MODULE 16: INGREDIENT LOT TRACKING ────────────────

  - module: "Ingredient Lot Tracking (FEFO)"
    status: "✅ Working"
    adr: "ADR-038"
    description: "ติดตาม stock batch-level ด้วย Lot ID + FEFO deduction"
    features:
      - name: "FR16.1: Lot Management"
        status: "✅ Working"
        description: |
          IngredientLot — LOT-YYYYMMDD-XXX, receivedQty, remainingQty, expiresAt
          status: ACTIVE | CONSUMED | EXPIRED | RECALLED
        implementation: "src/lib/repositories/kitchenRepo.js"

      - name: "FR16.2: FEFO Stock Deduction"
        status: "✅ Working"
        description: |
          completeSessionWithStockDeduction() ตัดจาก Lot เรียง expiresAt ASC (First Expired First Out)
          remainder logging ใน StockDeductionLog — full audit trail
        implementation: "src/lib/repositories/scheduleRepo.js"

      - name: "FR16.3: Lot API"
        status: "✅ Working"
        endpoints:
          - "GET/POST /api/kitchen/lots"
          - "GET/PATCH /api/kitchen/lots/[id]"

  # ── MODULE 17: TASK MANAGEMENT ────────────────────────

  - module: "Task Management"
    status: "✅ Working"
    features:
      - name: "Task CRUD"
        status: "✅ Working"
        description: "Follow-up, Call, Email, Meeting tasks — Assignee + Due Date"
        types: ["FOLLOW_UP", "CALL", "EMAIL", "MEETING", "DEMO"]
        priorities: ["LOW", "MEDIUM", "HIGH", "URGENT"]

# ─────────────────────────────────────────────────────────
# NON-FUNCTIONAL REQUIREMENTS
# ─────────────────────────────────────────────────────────

non_functional_requirements:

  - category: "Performance & Latency"
    requirements:
      - name: "NFR1 — Webhook Latency"
        description: "Webhook ตอบ Facebook < 200ms เสมอ — processEvent() fire-and-forget"
        endpoint: "/api/webhooks/facebook"
        status: "✅ Enforced"

      - name: "NFR2 — Dashboard API Latency"
        description: "Dashboard API < 500ms — Redis cache (ADR-034)"
        status: "✅ Enforced"

  - category: "Reliability & Integrity"
    requirements:
      - name: "NFR3 — BullMQ Retry"
        description: "BullMQ retry ≥ 5 ครั้ง, exponential backoff"
        status: "✅ Enforced"

      - name: "NFR4 — Webhook Signature Validation"
        description: "X-Hub-Signature-256 verify ทุก Facebook request"
        status: "✅ Enforced"

      - name: "NFR5 — Identity Upsert Transaction"
        description: "Identity upsert ต้องอยู่ใน prisma.$transaction เสมอ"
        status: "✅ Enforced"

      - name: "NFR6 — Race Condition Guard"
        description: |
          FB Webhook: findFirst → create ต้องครอบด้วย try-catch P2002
          ถ้า P2002 → retry findFirst เพื่อ recover
        status: "✅ Enforced (v0.18.0)"

  - category: "Code Quality"
    requirements:
      - name: "Error Logging"
        description: "ห้าม catch(e) {} เงียบ — ต้อง log ทุกครั้ง"
        format: "console.error('[ModuleName] message', error)"

      - name: "Repository Pattern"
        description: "ทุก DB operation ต้องผ่าน src/lib/repositories/ เท่านั้น"

      - name: "Icon Standard (ADR-031)"
        description: "ใช้ Lucide React เท่านั้น — ห้าม FontAwesome"

  - category: "Data Integrity Rules"
    rules:
      - name: "Aggregation Checksum"
        logic: "Sum(Ads.Metrics) == Campaign.Metrics"
        description: "ตรวจ data gap จาก Meta sync"

      - name: "Hourly Sync Continuity"
        logic: "Next_Sync_Hour == Current_Sync_Hour + 1"

      - name: "Differential Delta Rule"
        logic: "Delta = Current_Total - Previous_Total; if Delta == 0 → skip write"

  - category: "Reporting Calculation Formulas"
    formulas:
      - name: "ROAS"
        logic: "Total Revenue / Total Spend"
      - name: "CPA"
        logic: "Total Spend / Total Transactions"
      - name: "CON (Conversion Efficiency)"
        logic: "Total Transactions / Cost Per Result (CPR)"

# ─────────────────────────────────────────────────────────
# API SPECIFICATION (RESTful — Next.js App Router)
# ─────────────────────────────────────────────────────────

api_specification:

  - module: "Auth"
    endpoints:
      - method: "GET/POST"
        path: "/api/auth/[...nextauth]"
        purpose: "NextAuth session management (CredentialsOnly)"
      - method: "GET"
        path: "/api/agent/me"
        purpose: "ดึงข้อมูลพนักงานที่ login อยู่"

  - module: "Webhooks"
    endpoints:
      - method: "GET/POST"
        path: "/api/webhooks/facebook"
        purpose: "Facebook Messenger webhook — verify + receive events"
      - method: "POST"
        path: "/api/webhooks/line"
        purpose: "LINE Messaging API webhook"

  - module: "Marketing"
    endpoints:
      - method: "GET"
        path: "/api/marketing/campaigns"
        purpose: "List campaigns from DB"
      - method: "GET"
        path: "/api/marketing/adsets"
        purpose: "List ad sets from DB"
      - method: "GET"
        path: "/api/marketing/ads"
        purpose: "List ads from DB"
      - method: "GET"
        path: "/api/marketing/daily"
        purpose: "Daily metrics aggregated"
      - method: "POST"
        path: "/api/marketing/sync-hourly"
        purpose: "Trigger hourly sync from Meta Graph API"
      - method: "GET"
        path: "/api/marketing/chat/conversations"
        purpose: "Paginated conversation list (cursor-based)"
      - method: "GET"
        path: "/api/marketing/chat/messages"
        purpose: "Messages by conversation_id"

  - module: "Inbox"
    endpoints:
      - method: "GET"
        path: "/api/inbox/conversations"
        purpose: "Unified FB+LINE inbox (enriched customer data)"
      - method: "GET/POST"
        path: "/api/inbox/conversations/[id]/messages"
        purpose: "Paginated messages + reply"

  - module: "Customers"
    endpoints:
      - method: "GET/POST"
        path: "/api/customers"
        purpose: "List + create customers"
      - method: "GET/PATCH"
        path: "/api/customers/[id]"
        purpose: "Customer detail + update"

  - module: "Enrollments"
    endpoints:
      - method: "GET/POST"
        path: "/api/enrollments"
        purpose: "List + create enrollments"
      - method: "GET/PATCH"
        path: "/api/enrollments/[id]"
        purpose: "Detail + add hours"

  - module: "Schedules"
    endpoints:
      - method: "GET/POST"
        path: "/api/schedules"
        purpose: "List (upcoming/days) + create schedule"
      - method: "GET/PATCH"
        path: "/api/schedules/[id]"
        purpose: "Detail + update"
      - method: "POST"
        path: "/api/schedules/[id]/complete"
        purpose: "Complete session + real-time stock deduction"

  - module: "Kitchen"
    endpoints:
      - method: "GET/POST"
        path: "/api/kitchen/ingredients"
        purpose: "List (lowStockOnly filter) + create ingredient"
      - method: "PATCH"
        path: "/api/kitchen/ingredients/[id]"
        purpose: "Update ingredient / stock"
      - method: "GET/POST"
        path: "/api/kitchen/purchase"
        purpose: "List + create purchase requests"
      - method: "PATCH"
        path: "/api/kitchen/purchase/[id]"
        purpose: "Update PR status"

